services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    environment:
      - TZ=America/Bogota
      - GENERIC_TIMEZONE=America/Bogota
      - N8N_HOST=tu-cotizador-sumimilla-cotizador.j1cl77.easypanel.host
      - N8N_WEBHOOK_URL=https://cotizador-sumimilla-cotizador.j1cl77.easypanel.host
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_SECURE_COOKIE=true

      # Módulos permitidos dentro de nodos Function/Code
      - NODE_FUNCTION_ALLOW_BUILTIN=stream
      - NODE_FUNCTION_ALLOW_EXTERNAL=pdf-parse,mammoth,xlsx
      - NODE_PATH=/usr/local/lib/node_modules

      # CLAVE: Task Runners DESACTIVADOS.
      # El Task Runner externo de n8n 2.30.6 crashea en loop al iniciar
      # (bug conocido: @napi-rs/canvas requiere glibc, esta imagen es
      # musl/Alpine). Eso causaba el 101% de CPU constante.
      # Con esto, el código de Function/Code vuelve a correr en el
      # proceso principal (comportamiento pre-Task-Runners), que es más
      # simple y no depende del módulo canvas roto.
      - N8N_RUNNERS_ENABLED=false

      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=Isaac2014

    volumes:
      - n8n_data:/home/node/.n8n

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    # Si tu Compose no soporta "deploy", usa en su lugar:
    # cpus: "1.0"
    # mem_limit: 1024m

volumes:
  n8n_data:
